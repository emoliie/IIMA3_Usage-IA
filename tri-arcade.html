<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRI-O-MATIC — sorting arcade</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>
  <details class="cfg">
    <summary>⚙ model</summary>
    <div class="bar">
      <input id="modelUrl" type="text" value="https://teachablemachine.withgoogle.com/models/sM_ql2ICj/" aria-label="Model URL">
      <button class="btn" id="loadBtn">LOAD</button>
    </div>
  </details>
  <input type="file" id="fileInput" accept="image/*">
  <div id="holder"></div>
  <div class="hud">The model recognizes the material, the game tells you the right Paris bin. Everything runs locally — nothing is sent to the internet.</div>

<script src="sketch.js"></script>
</body>
</html>
